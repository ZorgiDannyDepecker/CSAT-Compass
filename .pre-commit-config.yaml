# .pre-commit-config.yaml
# CSAT-Compass — automatische pre-commit checks
# Alle hooks gebruiken repo: local — geen internet of GitHub-download vereist
# Vereiste tools zitten in .venv: ruff, mypy, bandit
#
# Eenmalige installatie: python -m pre_commit install
# Handmatig uitvoeren:   python -m pre_commit run --all-files

repos:
  - repo: local
    hooks:

      # -----------------------------------------------------------------------
      # Ruff — linting
      # -----------------------------------------------------------------------
      - id: ruff-lint
        name: Ruff — linting
        entry: python -m ruff check src/ tests/ --fix --exit-non-zero-on-fix
        language: system
        types: [python]
        pass_filenames: false

      # -----------------------------------------------------------------------
      # Ruff — opmaak + regellengte (max 100 tekens)
      # -----------------------------------------------------------------------
      - id: ruff-format
        name: Ruff — opmaak
        entry: python -m ruff format src/ tests/
        language: system
        types: [python]
        pass_filenames: false

      # -----------------------------------------------------------------------
      # Mypy — statische typecontrole
      # -----------------------------------------------------------------------
      - id: mypy
        name: MyPy — typecontrole
        entry: python -m mypy src/ --ignore-missing-imports --no-error-summary
        language: system
        types: [python]
        pass_filenames: false

      # -----------------------------------------------------------------------
      # Bandit — security scan
      # -----------------------------------------------------------------------
      - id: bandit
        name: Bandit — security scan
        entry: python -m bandit -r src/ -ll -q
        language: system
        types: [python]
        pass_filenames: false

      # -----------------------------------------------------------------------
      # Python syntax check
      # -----------------------------------------------------------------------
      - id: check-ast
        name: Python syntax (AST)
        entry: python -m py_compile
        language: system
        types: [python]

      # -----------------------------------------------------------------------
      # Geen merge-conflicten
      # -----------------------------------------------------------------------
      - id: check-merge-conflict
        name: Geen merge-conflicten
        entry: python -c "import sys,pathlib;[sys.exit(1) or print('Conflict:',f) for f in sys.argv[1:] if '<'*7 in pathlib.Path(f).read_text(errors='ignore')]"
        language: system
        types: [text]
        exclude: '(\.pre-commit-config\.yaml|docs/03-operationeel/kwaliteitscontrole\.md)$'

# Configuratie
default_stages: [pre-commit]
fail_fast: false
minimum_pre_commit_version: "3.6.0"

